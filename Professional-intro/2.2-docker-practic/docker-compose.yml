services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  web:
    build: ./app
    expose:
      - "5050"
    depends_on:
      - redis
    volumes:
      - ./app:/app
    environment:
      - FLASK_ENV=development
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
